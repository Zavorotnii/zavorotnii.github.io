<!DOCTYPE html><html lang="en"><head>    <head>    <meta charset="UTF-8">    <meta name="viewport" content="width=1920px">    <link rel="stylesheet" href="css/style.min.css">    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">    <script src="js/script.js"></script>    <title>FastoCloud</title>    <link rel="icon" href="img/cloud.svg"></head></head><body>    <div class="wrapper">        <header class="header">    <div class="header_logo_icon">        <div class="logo">            <div class="logo_vector">                <picture><source srcset="img/cloud.svg" type="image/webp"><img src="img/cloud.svg" alt=""></picture>            </div>        </div>        <div class="logo_text">            <p>FastoCloud</p>        </div>        <div class="header_social_icon">            <a href=""><picture><source srcset="img/instagram.svg" type="image/webp"><img src="img/instagram.svg" alt=""></picture></a>            <a href=""><picture><source srcset="img/facebook.svg" type="image/webp"><img src="img/facebook.svg" alt=""></picture></a>            <a href=""><picture><source srcset="img/discord.svg" type="image/webp"><img src="img/discord.svg" alt=""></picture></a>            <a href=""><picture><source srcset="img/in.svg" type="image/webp"><img src="img/in.svg" alt=""></picture></a>        </div>    </div>    <div class="text_header">        <h1 class="desktop">Audio/Video call solution for independent clients</h1>        <picture><source srcset="img/notebook.svg" type="image/webp"><img src="img/notebook.svg" alt=""></picture>        <h1 class="mobile">Audio/Video call solution for independent clients</h1>    </div></header>        <main class="main">            <div class="main_contact">    <div class="map">        <iframe            src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d179570.92268396326!2d30.267743063403504!3d59.952016765991985!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1sen!2sru!4v1637227054999!5m2!1sen!2sru"            width="1170px" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>    </div>    <h3>Get in Touch</h3>    <div class="content_contact">        <form action="mailto:id.zavorotniy@yandex.ru" method="post" enctype="text/plain">            <input type="text" id="fname" name="firstname" placeholder="Enter your name">            <textarea id="subject" name="subject" placeholder="Enter Message.." style="height:200px"></textarea>            <input type="submit" value="Send Message">        </form>        <div class="social_contact">            <i class="fas fa-home"></i>            <p><b>Saint Petersburg, Russia</b><br>Vyborgsky district</p>            <i class="fas fa-tablet-alt"></i>            <p><b>+7 (921) 353 22 72</b><br>Mon to Fri 9am to 6pm</p>            <i class="fas fa-envelope"></i>            <p><b>support@test.com</b><br>Send me your query anytime!</p>        </div>    </div></div>        </main>        <footer class="footer">    <div class="feedback">        <h1>LET'S START YOUR PROJECT</h1>        <form action="mailto:test@mail.com" method="post" enctype="text/plain">            <input type="text" id="email" name="email" placeholder="E-mail">            <textarea name="subject" id="subject" placeholder="Your message"></textarea>            <!-- <input type="submit" value="SEND"> -->        </form>        <input type="submit" value="SEND">    </div></footer>    </div>    <script src="js/script.min.js"></script></body></html>
